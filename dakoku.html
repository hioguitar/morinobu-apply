<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>打刻修正申請｜森信建設</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #2a9090;
  --brand-dark: #1e6e6e;
  --brand-light: #e0f4f4;
  --bg: #f0f4f4;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-sub: #666;
  --border: rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 9px;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.header {
  background: var(--brand);
  padding: 28px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -30px; left: -20px;
  width: 100px; height: 100px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
}
.header-company {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  position: relative;
}
.header-title {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
  position: relative;
}
.header-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 10px;
  position: relative;
}

.back-bar {
  background: var(--brand-dark);
  padding: 10px 16px;
}
.back-link {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-link svg { width: 16px; height: 16px; }

.content {
  padding: 20px 16px 40px;
  max-width: 480px;
  margin: 0 auto;
}

.section { margin-bottom: 28px; }
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--brand-dark);
  letter-spacing: 1.5px;
  padding: 0 4px 10px;
  border-bottom: 1.5px solid var(--brand-light);
  margin-bottom: 12px;
}

/* 手順バッジ */
.step-hint {
  background: var(--brand-light);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: var(--brand-dark);
  line-height: 1.6;
  margin-bottom: 16px;
}
.step-hint strong { font-weight: 700; }

.card-list {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 0.5px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.menu-item {
  display: flex;
  align-items: center;
  padding: 16px;
  border-bottom: 0.5px solid var(--border);
  text-decoration: none;
  color: inherit;
  gap: 14px;
  transition: background 0.15s;
  -webkit-tap-highlight-color: rgba(0,0,0,0.04);
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: #f5f5f5; }

.menu-icon {
  width: 46px;
  height: 46px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.menu-icon svg { width: 24px; height: 24px; }
.ic-teal { background: var(--brand-light); color: var(--brand); }

/* ステップ番号 */
.step-badge {
  font-size: 10px;
  font-weight: 700;
  color: var(--brand-dark);
  background: var(--brand-light);
  border-radius: 20px;
  padding: 1px 8px;
  margin-bottom: 3px;
  display: inline-block;
  letter-spacing: 0.5px;
}

.menu-text { flex: 1; min-width: 0; }
.menu-name {
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
}
.menu-desc {
  font-size: 13px;
  color: var(--text-sub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.menu-arrow { color: #ccc; flex-shrink: 0; }
.menu-arrow svg { width: 18px; height: 18px; }

.footer {
  text-align: center;
  font-size: 10px;
  color: #aaa;
  padding: 8px 0 20px;
}
</style>
</head>
<body>

<div class="header">
  <p class="header-company">MORINOBU CONSTRUCTION</p>
  <h1 class="header-title">打刻修正申請</h1>
  <p class="header-sub">出勤・退勤の漏れや時刻ミスの修正</p>
</div>

<div class="back-bar">
  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    申請メニューに戻る
  </a>
</div>

<div class="content">
  <div class="section">
    <p class="section-label">申請の手順</p>

    <p class="step-hint">
      <strong>① まずマニュアルを確認</strong>してから、<strong>② KING OF TIME で申請</strong>してください。
    </p>

    <div class="card-list">

      <!-- STEP 1：マニュアル -->
      <a class="menu-item" href="dakoku_manual.html" target="_blank">
        <div class="menu-icon ic-teal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="menu-text">
          <span class="step-badge">STEP 1</span>
          <p class="menu-name">申請マニュアルを見る</p>
          <p class="menu-desc">操作手順をここで確認してください</p>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>

      <!-- STEP 2：KOTログイン -->
      <a class="menu-item" href="https://s2.ta.kingoftime.jp/admin" target="_blank" rel="noopener noreferrer">
        <div class="menu-icon ic-teal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="menu-text">
          <span class="step-badge">STEP 2</span>
          <p class="menu-name">打刻修正を申請する</p>
          <p class="menu-desc">KING OF TIME のログイン画面へ</p>
        </div>
        <span class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>

    </div>
  </div>

  <p class="footer">森信建設株式会社</p>
</div>

</body>
</html>
